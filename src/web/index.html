<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resound</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="transport">
        <div class="transport-buttons">
          <button id="play" type="button" class="transport-btn">▶ Play</button>
          <button id="stop" type="button" class="transport-btn">■ Stop</button>
        </div>
        <label class="control bpm">
          <span class="control-label">BPM</span>
          <button id="bpm-down" type="button" class="step-btn" aria-label="Decrease BPM">−</button>
          <input id="bpm" type="number" min="40" max="240" step="1" value="120" />
          <button id="bpm-up" type="button" class="step-btn" aria-label="Increase BPM">+</button>
        </label>
        <label class="control swing">
          <span class="control-label">Swing</span>
          <input id="swing" type="range" min="0.5" max="0.75" step="0.01" value="0.5" />
          <span id="swing-value" class="control-readout">50%</span>
        </label>
        <label class="control master">
          <span class="control-label">Master</span>
          <input id="master" type="range" min="0" max="1" step="0.01" value="0.8" />
        </label>
        <button id="more-menu" type="button" class="more-btn" aria-label="More actions">⋮</button>
      </header>
      <div class="action-bar">
        <button id="undo" type="button" class="action-btn" title="Undo (Cmd/Ctrl+Z)">↶ Undo</button>
        <button id="redo" type="button" class="action-btn" title="Redo (Cmd/Ctrl+Shift+Z)">↷ Redo</button>
        <button id="clear-pattern" type="button" class="action-btn">Clear Pat.</button>
        <div class="action-spacer"></div>
        <button id="reset-all" type="button" class="action-btn danger" hidden>Reset All</button>
      </div>
      <section id="grid" class="grid" aria-label="Pattern grid"></section>
      <section id="inspector" class="inspector" hidden></section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
